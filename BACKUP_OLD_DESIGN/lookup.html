<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Booking — Grand Azure Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&family=Cormorant:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/public.css"/>
</head>
<body>

<nav class="pub-nav scrolled">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <div class="nav-logo-mark"><span>✦</span></div>
      <div class="nav-brand-text">
        <span class="nav-brand-main">Grand Azure</span>
        <span class="nav-brand-sub">Luxury Hotel</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/rooms">Rooms & Suites</a>
      <a href="/lookup" class="active">My Booking</a>
      <a href="/book" class="nav-cta">Reserve Now</a>
    </div>
    <button class="nav-hamburger" onclick="toggleMobileNav()">☰</button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="/">Home</a><a href="/rooms">Rooms & Suites</a><a href="/lookup">My Booking</a><a href="/book">Reserve Now</a>
  </div>
</nav>

<section class="page-hero">
  <div class="page-hero-content">
    <p class="hero-eyebrow">Reservations</p>
    <h1 class="page-hero-title">Find My Booking</h1>
    <p class="page-hero-sub">Look up your reservation details and download your invoice</p>
  </div>
</section>

<section class="lookup-section">
  <div class="lookup-box">
    <div class="lookup-form">
      <h3 class="lookup-title">Enter Your Details</h3>
      <div class="pub-form-group" style="margin-bottom:16px">
        <label>Email Address *</label>
        <input type="email" id="lEmail" class="pub-input" placeholder="The email used when booking"/>
      </div>
      <div class="pub-form-group" style="margin-bottom:28px">
        <label>Reservation Number (optional)</label>
        <input type="number" id="lRef" class="pub-input" placeholder="e.g. 12"/>
      </div>
      <button class="btn-gold-lg" style="width:100%" onclick="lookupBooking()">Find My Booking</button>
    </div>
    <div id="lookupResults" style="margin-top:24px"></div>
  </div>
</section>

<footer class="pub-footer">
  <div class="footer-inner">
    <div class="footer-bottom" style="padding-top:0;border:none">
      <p class="footer-copy">© 2024 Grand Azure Hotel · <a href="/" style="color:var(--gold)">Back to Home</a></p>
    </div>
  </div>
</footer>

<script>
  const statusColors = { confirmed:'#C9A84C', checked_in:'#2D82B7', checked_out:'#8B5CF6', cancelled:'#E05252' };

  async function lookupBooking() {
    const email = document.getElementById('lEmail').value.trim();
    const ref   = document.getElementById('lRef').value.trim();
    if (!email) { alert('Please enter your email address'); return; }

    const div = document.getElementById('lookupResults');
    div.innerHTML = '<div class="rooms-loading">Searching…</div>';

    try {
      const res  = await fetch('/api/lookup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email, reservation_id:ref }) });
      const data = await res.json();

      if (!data.length) {
        div.innerHTML = `<div class="no-rooms"><div class="no-rooms-icon">🔍</div><h3>No bookings found</h3><p>Please check your email address or reservation number</p></div>`;
        return;
      }

      div.innerHTML = `<p style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px">${data.length} reservation${data.length>1?'s':''} found</p>` +
        data.map(r => `
          <div class="lookup-result-card">
            <div class="lrc-top">
              <div>
                <div class="lrc-ref">Reservation #${r.reservation_id}</div>
                <div class="lrc-room">Room ${r.room_number} — ${r.room_type}</div>
              </div>
              <span class="lrc-status" style="background:${statusColors[r.status]}18;color:${statusColors[r.status]};border:1px solid ${statusColors[r.status]}40">${r.status.replace(/_/g,' ')}</span>
            </div>
            <div class="lrc-dates">
              <div><strong>Check In</strong><br/>${new Date(r.check_in_date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
              <div class="lrc-arrow">→</div>
              <div><strong>Check Out</strong><br/>${new Date(r.check_out_date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
              <div><strong>Total</strong><br/><span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--gold)">$${parseFloat(r.total_price).toFixed(2)}</span></div>
            </div>
            <div class="lrc-actions">
              <a href="/invoices/view/${r.reservation_id}" target="_blank" class="btn-outline-gold" style="font-size:10px;padding:10px 24px">Download Invoice</a>
            </div>
          </div>`).join('');
    } catch(e) {
      div.innerHTML = '<div class="no-rooms"><h3>Unable to search</h3><p>Please ensure the server is running</p></div>';
    }
  }

  function toggleMobileNav() { document.getElementById('navMobile').classList.toggle('open'); }
</script>
</body>
</html>
