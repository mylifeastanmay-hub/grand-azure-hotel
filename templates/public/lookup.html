<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Booking — Grand Azure Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/public.css"/>
</head>
<body>

<nav class="pub-nav scrolled">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <span class="nav-brand-icon">✦</span>
      <span class="nav-brand-name">Grand Azure</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/rooms">Rooms</a>
      <a href="/lookup" class="active">My Booking</a>
      <a href="/book" class="nav-cta">Book Now</a>
    </div>
    <button class="nav-hamburger" onclick="toggleMobileNav()">☰</button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="/">Home</a><a href="/rooms">Rooms</a><a href="/lookup">My Booking</a><a href="/book">Book Now</a>
  </div>
</nav>

<section class="page-hero">
  <div class="page-hero-content">
    <p class="hero-eyebrow">Reservations</p>
    <h1 class="page-hero-title">Find My Booking</h1>
    <p class="page-hero-sub">Look up your reservation details anytime</p>
  </div>
</section>

<section class="lookup-section">
  <div class="lookup-box">
    <div class="lookup-form">
      <h3 class="lookup-title">Enter Your Details</h3>
      <div class="pub-form-group">
        <label>Email Address *</label>
        <input type="email" id="lEmail" class="pub-input" placeholder="The email used when booking"/>
      </div>
      <div class="pub-form-group">
        <label>Reservation Number (optional)</label>
        <input type="number" id="lRef" class="pub-input" placeholder="e.g. 12"/>
      </div>
      <button class="btn-gold-lg" style="width:100%" onclick="lookupBooking()">Find My Booking</button>
    </div>

    <div id="lookupResults" style="margin-top:32px"></div>
  </div>
</section>

<footer class="pub-footer">
  <div class="footer-inner">
    <div class="footer-brand"><span class="nav-brand-icon">✦</span><span class="footer-name">Grand Azure Hotel</span></div>
    <div class="footer-links"><a href="/">Home</a><a href="/rooms">Rooms</a><a href="/book">Book Now</a></div>
    <p class="footer-copy">© 2024 Grand Azure Hotel. All rights reserved.</p>
  </div>
</footer>

<script>
  const statusColors = { confirmed:'#D4A853', checked_in:'#2D82B7', checked_out:'#8B5CF6', cancelled:'#E05252' };

  async function lookupBooking() {
    const email = document.getElementById('lEmail').value.trim();
    const ref   = document.getElementById('lRef').value.trim();
    if (!email) { alert('Please enter your email address'); return; }

    const res  = await fetch('/api/lookup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, reservation_id: ref }) });
    const data = await res.json();
    const div  = document.getElementById('lookupResults');

    if (!data.length) {
      div.innerHTML = `<div class="no-rooms"><div class="no-rooms-icon">🔍</div><h3>No bookings found</h3><p>Please check your email address or reservation number</p></div>`;
      return;
    }

    div.innerHTML = `<h3 style="color:#D4A853;font-family:var(--serif);margin-bottom:16px">${data.length} reservation${data.length>1?'s':''} found</h3>` +
      data.map(r => `
        <div class="lookup-result-card">
          <div class="lrc-top">
            <div>
              <div class="lrc-ref">Reservation #${r.reservation_id}</div>
              <div class="lrc-room">Room ${r.room_number} — ${r.room_type}</div>
            </div>
            <span class="lrc-status" style="background:${statusColors[r.status]}22;color:${statusColors[r.status]}">${r.status.replace(/_/g,' ')}</span>
          </div>
          <div class="lrc-dates">
            <div><strong>Check In</strong><br/>${new Date(r.check_in_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
            <div class="lrc-arrow">→</div>
            <div><strong>Check Out</strong><br/>${new Date(r.check_out_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
            <div><strong>Total</strong><br/>$${parseFloat(r.total_price).toFixed(2)}</div>
          </div>
          <div class="lrc-actions">
            <a href="/invoices/view/${r.reservation_id}" target="_blank" class="btn-outline-gold" style="font-size:13px;padding:8px 16px">View Invoice</a>
          </div>
        </div>`).join('');
  }

  function toggleMobileNav() { document.getElementById('navMobile').classList.toggle('open'); }
</script>
</body>
</html>
