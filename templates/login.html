<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Grand Azure Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body class="login-body">

  <div class="login-split">
    <!-- Left panel -->
    <div class="login-brand-panel">
      <div class="login-brand-content">
        <div class="login-brand-icon">✦</div>
        <h1 class="login-brand-name">Grand Azure</h1>
        <p class="login-brand-tagline">Where Luxury Meets Excellence</p>
        <div class="login-brand-divider"></div>
        <p class="login-brand-sub">Hotel Management System</p>
      </div>
      <div class="login-brand-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="login-form-panel">
      <div class="login-form-inner">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to the management portal</p>

        <div id="loginError" class="login-error" style="display:none"></div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required autocomplete="username"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-with-toggle">
              <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password"/>
              <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            Sign In
          </button>
        </form>

        <p class="login-hint">Default: admin / admin123</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      err.style.display = 'none';

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect;
      } else {
        err.textContent = data.message || 'Login failed';
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });

    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
